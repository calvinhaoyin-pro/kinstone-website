# Deploy frontend to S3 + CloudFront on push to main.
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_REGION                  e.g. us-west-2
#   S3_BUCKET                   e.g. your-kinstone-frontend-bucket
#   CLOUDFRONT_DISTRIBUTION_ID  e.g. E1234567890ABC
#   VITE_API_BASE_URL           e.g. https://zqzhw2gnef.execute-api.us-west-2.amazonaws.com
#
# IAM user needs at minimum: s3:PutObject, s3:DeleteObject, s3:ListBucket on the bucket,
# and cloudfront:CreateInvalidation on the distribution.

name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-frontend-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync dist/ "s3://${{ secrets.S3_BUCKET }}" --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
